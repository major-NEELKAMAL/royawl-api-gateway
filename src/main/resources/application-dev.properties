spring.application.name=royawl-api-gateway
server.port=8080

# ====================== Eureka ======================
eureka.client.service-url.defaultZone=http://192.168.1.8:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ====================== Load Balancer ======================
spring.cloud.loadbalancer.enabled=true

# ====================== Gateway Routes ======================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ====================== Forwarded Headers ======================
spring.cloud.gateway.forwarded.enabled=true
spring.cloud.gateway.x-forwarded.enabled=true

# Route for royawl-api
spring.cloud.gateway.routes[0].id=royawl-api
spring.cloud.gateway.routes[0].uri=lb://royawl-api
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**
spring.cloud.gateway.routes[0].filters[0]=PreserveHostHeader

# 2. WebSocket Route (wpi)
spring.cloud.gateway.routes[1].id=royawl-api-websocket
spring.cloud.gateway.routes[1].uri=lb://royawl-api
spring.cloud.gateway.routes[1].predicates[0]=Path=/wsi/**
spring.cloud.gateway.routes[1].filters[0]=PreserveHostHeader

# 3. Actuator / Metrics Route (optional - you can expose or hide)
spring.cloud.gateway.routes[2].id=royawl-api-actuator
spring.cloud.gateway.routes[2].uri=lb://royawl-api
spring.cloud.gateway.routes[2].predicates[0]=Path=/actuator/**
spring.cloud.gateway.routes[2].filters[0]=PreserveHostHeader

# Route for royawl-job
spring.cloud.gateway.routes[3].id=royawl-job
spring.cloud.gateway.routes[3].uri=lb://royawl-job
spring.cloud.gateway.routes[3].predicates[0]=Path=/job/**
spring.cloud.gateway.routes[3].filters[0]=PreserveHostHeader

# Route for royawl-recommendation-service
spring.cloud.gateway.routes[4].id=royawl-recommendation-service
spring.cloud.gateway.routes[4].uri=lb://royawl-recommendation-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/recommendations/**
spring.cloud.gateway.routes[4].filters[0]=PreserveHostHeader

# ====================== Actuator ======================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always



app.exposed-headers=Authorization,hasMore,currentChunkIndex,totalChunks
app.allowed-origins=http://localhost:9091,http://192.168.1.8:9091,http://ui.royawl.com:9091,http://127.0.0.1:9091
